<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="100" fill="#0C1929"/>

  <!-- Grid lines (background) -->
  <line x1="200" y1="60" x2="200" y2="340" stroke="#0C447C" stroke-width="5" opacity="0.5"/>
  <line x1="60" y1="200" x2="340" y2="200" stroke="#0C447C" stroke-width="5" opacity="0.5"/>
  <line x1="100" y1="100" x2="300" y2="300" stroke="#0C447C" stroke-width="5" opacity="0.3"/>
  <line x1="300" y1="100" x2="100" y2="300" stroke="#0C447C" stroke-width="5" opacity="0.3"/>

  <!-- Center node -->
  <circle cx="200" cy="200" r="40" fill="#378ADD"/>
  <circle cx="200" cy="200" r="20" fill="#fff"/>

  <!-- Main 4 nodes (bright) -->
  <circle cx="200" cy="70" r="22" fill="#85B7EB"/>
  <circle cx="330" cy="200" r="22" fill="#85B7EB"/>
  <circle cx="200" cy="330" r="22" fill="#85B7EB"/>
  <circle cx="70" cy="200" r="22" fill="#85B7EB"/>

  <!-- Diagonal 4 nodes (subtle) -->
  <circle cx="300" cy="100" r="16" fill="#185FA5"/>
  <circle cx="300" cy="300" r="16" fill="#185FA5"/>
  <circle cx="100" cy="300" r="16" fill="#185FA5"/>
  <circle cx="100" cy="100" r="16" fill="#185FA5"/>

  <!-- Connection lines (bright) -->
  <line x1="200" y1="160" x2="200" y2="92" stroke="#378ADD" stroke-width="10" stroke-linecap="round"/>
  <line x1="240" y1="200" x2="308" y2="200" stroke="#378ADD" stroke-width="10" stroke-linecap="round"/>
  <line x1="200" y1="240" x2="200" y2="308" stroke="#378ADD" stroke-width="10" stroke-linecap="round"/>
  <line x1="160" y1="200" x2="92" y2="200" stroke="#378ADD" stroke-width="10" stroke-linecap="round"/>
</svg>
